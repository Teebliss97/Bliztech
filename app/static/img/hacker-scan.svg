  <rect x="452" y="236" width="4" height="44" rx="2" fill="#00d97e"/>
  <text x="464" y="253" font-family="monospace" font-size="9" fill="#00d97e">INFO</text>
  <text x="464" y="268" font-family="monospace" font-size="8" fill="#888">Firewall rules: 14 active</text>
</g>

<line x1="432" y1="200" x2="450" y2="200" stroke="#00d97e" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.3"/>

