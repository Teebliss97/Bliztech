  <rect x="452" y="120" width="4" height="44" rx="2" fill="#ef4444"/>
  <text x="464" y="137" font-family="monospace" font-size="9" fill="#ef4444">CRITICAL</text>
  <text x="464" y="152" font-family="monospace" font-size="8" fill="#888">CVE-2024-1337 detected</text>
</g>

