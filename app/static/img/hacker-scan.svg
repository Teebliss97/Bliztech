<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="display:block;background:#0a0a0a;border-radius:12px;border:1px solid rgba(0,217,126,0.2)">
<defs>
  <style>
    @keyframes scan { 0%{transform:translateY(0)} 100%{transform:translateY(180px)} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
    @keyframes fly { 0%{opacity:0;transform:translateX(0)} 20%{opacity:1} 80%{opacity:1} 100%{opacity:0;transform:translateX(-60px)} }
    @keyframes alert { 0%,100%{opacity:0;transform:translateY(4px)} 15%,85%{opacity:1;transform:translateY(0)} }
    @keyframes glow { 0%,100%{opacity:0.15} 50%{opacity:0.35} }
    .scan-line { animation: scan 2.8s linear infinite; }
    .cur { animation: blink 1s step-end infinite; }
    .dot-pulse { animation: pulse 1.8s ease-in-out infinite; }
    .code1 { animation: fly 3.2s ease-in-out infinite; }
    .code2 { animation: fly 3.2s ease-in-out 0.6s infinite; }
    .code3 { animation: fly 3.2s ease-in-out 1.3s infinite; }
    .alert1 { animation: alert 4s ease-in-out infinite; }
    .alert2 { animation: alert 4s ease-in-out 1.4s infinite; }
    .alert3 { animation: alert 4s ease-in-out 2.8s infinite; }
    .glow-r { animation: glow 2.5s ease-in-out infinite; }
  </style>
</defs>

<ellipse cx="260" cy="280" rx="200" ry="120" fill="#00d97e" opacity="0.04" class="glow-r"/>
<ellipse cx="500" cy="200" rx="160" ry="100" fill="#00d97e" opacity="0.06" class="glow-r"/>

<rect x="60" y="330" width="420" height="8" rx="2" fill="#1a1a1a"/>
<rect x="40" y="338" width="460" height="4" rx="2" fill="#141414"/>

<rect x="110" y="310" width="320" height="22" rx="6" fill="#1c1c1e"/>
<rect x="120" y="312" width="300" height="18" rx="4" fill="#222224"/>
