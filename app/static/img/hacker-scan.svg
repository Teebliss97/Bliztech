<rect x="122" y="114" width="296" height="182" rx="4" fill="#070709"/>

<g class="scan-line" style="clip-path:inset(0 0 0 0)">
  <rect x="122" y="114" width="296" height="2" fill="#00d97e" opacity="0.25" rx="1"/>
</g>

<text x="130" y="134" font-family="monospace" font-size="9" fill="#00d97e" opacity="0.9">$ run vuln-scan --target 192.168.1.0/24</text>
<text x="130" y="148" font-family="monospace" font-size="9" fill="#555">&gt; Initialising scan engine...</text>
<text x="130" y="162" font-family="monospace" font-size="9" fill="#555">&gt; Loading CVE database... done</text>
<text x="130" y="176" font-family="monospace" font-size="9" fill="#f59e0b" opacity="0.9">&gt; Port 22 open — SSH detected</text>
<text x="130" y="190" font-family="monospace" font-size="9" fill="#f59e0b" opacity="0.9">&gt; Port 80 open — HTTP (unencrypted)</text>
<text x="130" y="204" font-family="monospace" font-size="9" fill="#ef4444" opacity="0.9">&gt; CVE-2024-1337 — CRITICAL found</text>
<text x="130" y="218" font-family="monospace" font-size="9" fill="#ef4444" opacity="0.9">&gt; Weak credentials on /admin</text>
<text x="130" y="232" font-family="monospace" font-size="9" fill="#00d97e">&gt; Generating report...</text>
<text x="130" y="248" font-family="monospace" font-size="9" fill="#00d97e">$ <tspan class="cur" fill="#00d97e">&#9608;</tspan></text>

<rect x="130" y="258" width="270" height="4" rx="2" fill="#1a1a1a"/>
<rect x="130" y="258" width="196" height="4" rx="2" fill="#00d97e" opacity="0.8"/>
<text x="130" y="278" font-family="monospace" font-size="8" fill="#444">73% complete — 12 hosts scanned</text>

<g class="code1" style="transform-origin:80px 180px">
  <text x="52" y="160" font-family="monospace" font-size="8" fill="#00d97e" opacity="0.7">0xDEAD</text>
</g>
<g class="code2" style="transform-origin:75px 200px">
  <text x="47" y="200" font-family="monospace" font-size="8" fill="#00d97e" opacity="0.5">FF:A0:3C</text>
</g>
