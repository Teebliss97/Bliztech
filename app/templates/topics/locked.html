{% extends "base.html" %}

{% block content %}
<div class="auth-card" style="max-width:520px; margin-top:48px;">
  <div style="font-size:32px; margin-bottom:16px;">🔒</div>
  <h1 style="font-family:'Sora',sans-serif; font-size:22px; font-weight:700; margin:0 0 8px;">Topic locked</h1>
  <p class="muted" style="font-size:14px; margin:0 0 20px;">
    Complete the previous quiz to unlock <strong>{{ topic.title }}</strong>.
  </p>

  <ol style="color:var(--muted); font-size:14px; line-height:1.85; margin:0 0 24px 18px;">
    <li>Go back to Topics</li>
    <li>Complete the previous quiz</li>
    <li>Return here to continue</li>
  </ol>

  <a class="btn" href="{{ url_for('topics.list_topics') }}">← Back to Topics</a>
</div>
{% endblock %}
